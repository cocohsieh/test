<!doctype html>
<html lang="en">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS v5.2.0-beta1 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"  integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <style>
        /* * {
            margin: 0;
            padding: 0;
        } */
       
        .header {
            height: 100px;
            background: rgb(223, 193, 193);
            display: flex;
            justify-content: space-between;
        }

        .title{
            height: 100%;
            display: flex;
            align-items: center;
            border: 1px solid black;
        }
        .link ul{
            height: 100%;
            display: flex;
            align-items: center;
            border: 1px solid blue
        }
        .link ul li a{
           padding: 10px; 
        }
        .mail-md, .mail-sm {
                display: none;
            }

        /* ------RWD------ */
        /* 平板 */
        @media screen and (max-width: 992px) {
            .mail-lg, .mail-sm {
                display: none;
            }
            .mail-md {
                display: block;
            }
        }
        /* 手機 */
        @media screen and (max-width: 768px) {
            .mail-lg, .mail-md {
                display: none;
            }
            .mail-sm {
                display: block;
            }
        }
        
    </style>
  </head>

  <body>
      <div class="container-fluid">
          <div class="row ">
              <div class="col header">
                <div class="title">
                    <img class="mail-lg" src="images/mail-lg.png" alt="">
                    <img class="mail-md" src="images/mail-md.png" alt="">
                    <img class="mail-sm" src="images/mail-sm.png" alt="">
                    <a class="" href="">NinjiaMail</a>
                </div>
                <div class="link">
                    <ul class="list-unstyled">
                        <li> <a class="navlink" href="">FEATURES</a> </li>
                        <li> <a class="navlink" href="">PRICNG</a> </li>
                        <li> <a class="navlink" href="">SERVICES</a> </li>
                        <li> <a class="navlink" href="">PARTNERS</a> </li>
                        <li> <a class="signup active" href="">SIGN UP FREE</a> </li>
                    </ul>
                </div>
            </div>
            
                
            
          </div>
      </div>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js" integrity="sha384-Xe+8cL9oJa6tN/veChSP7q+mnSPaj5Bcu9mPX5F5xIGE0DVittaqT5lorf0EI7Vk" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.min.js" integrity="sha384-kjU+l4N0Yf4ZOJErLsIcvOU2qSb74wXpOhqTvwVx3OElZRweTnQ6d31fXEoRD1Jy" crossorigin="anonymous"></script>
  </body>
</html>
